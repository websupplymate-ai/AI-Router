name = "ai-router"
main = "src/index.js"
compatibility_date = "2026-07-01"

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "platform-ai-usage"
database_id = "6ee4de6d-6682-406b-b26f-90b5a8b2ba52"

# ANTHROPIC_API_KEY is a SECRET — set it after first deploy with:
